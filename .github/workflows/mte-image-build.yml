name: MTE image build

on:
  pull_request:
  push:
    branches: [codex/mte-immutable-runtime]

permissions:
  contents: read

concurrency:
  group: mte-image-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up checksum-pinned official gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITHUB_TOKEN: ${{ github.token }}
      - run: node scripts/verify-mte-fork.mjs
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.1
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.18.0
        with:
          context: .
          file: Dockerfile.mte
          platforms: linux/amd64
          push: false
          build-args: |
            VCS_REF=${{ github.sha }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=sha-${{ github.sha }}
          provenance: mode=max
          sbom: true
