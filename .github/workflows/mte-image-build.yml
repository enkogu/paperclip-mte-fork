name: MTE image build

on:
  pull_request:
  push:
    branches: [main, codex/mte-immutable-runtime]

permissions:
  contents: read

concurrency:
  group: mte-image-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install checksum-pinned Gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check -
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" gitleaks
          chmod 0755 "$RUNNER_TEMP/gitleaks"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - run: node scripts/verify-mte-fork.mjs
      - name: Guard the CodeQL workflow contract
        run: node --test scripts/codeql-workflow.test.mjs
      - name: Set up pnpm for the isolated Daytona plugin test
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 9.15.4
          run_install: false
      - name: Set up Node.js for the isolated Daytona plugin test
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/plugins/sandbox-providers/daytona/image-build/pnpm-lock.yaml
      - name: Install frozen Daytona plugin test dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm -C packages/plugins/sandbox-providers/daytona/image-build install --frozen-lockfile --ignore-scripts
          mkdir -p packages/plugins/sandbox-providers/daytona/node_modules
          ln -s ../image-build/node_modules/@daytonaio packages/plugins/sandbox-providers/daytona/node_modules/@daytonaio
          test -L packages/plugins/sandbox-providers/daytona/node_modules/@paperclipai/plugin-sdk
          test -L packages/plugins/sdk/node_modules/@paperclipai/shared
      - name: Run isolated Daytona plugin test lane
        run: node scripts/run-vitest-stable.mjs --mode general --group general-daytona-plugin
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.1
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.18.0
        with:
          context: .
          file: Dockerfile.mte
          platforms: linux/amd64
          push: false
          build-args: |
            VCS_REF=${{ github.sha }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=sha-${{ github.sha }}
          provenance: mode=max
          sbom: true
