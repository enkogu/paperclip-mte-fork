name: Agent runtime images

on:
  push:
    branches: [master]
    paths:
      - "docker/agent-runtime/**"
      - "tools/agent-shim/**"
      - ".github/workflows/agent-runtime-images.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g., v1.0.0 or dev-test)"
        required: true
        default: "dev"

permissions:
  contents: read
  packages: write
  id-token: write   # cosign keyless OIDC

env:
  VERSION: ${{ github.event.inputs.version || format('git-{0}', github.sha) }}

jobs:
  build-and-sign:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select this fork's registry namespace
        shell: bash
        run: echo "REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.1

      - name: Log into GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.10.1

      - name: Build + push all deployed harness images (linux/amd64)
        id: bake
        run: |
          # Scope: the five harnesses the kubernetes sandbox provider supports
          # out of the box (opencode, pi, codex, gemini, claude). acpx/hermes
          # have Dockerfiles in the bake group but are not published by default.
          # Platforms come from the bake HCL (linux/amd64).
          # Use --push rather than a "*.push" --set so the wildcard does not hit
          # the bake group (which has no such key -> "unknown key" error).
          docker buildx bake \
            -f docker/agent-runtime/buildx-bake.hcl \
            base opencode pi codex gemini claude \
            --push \
            --metadata-file=bake-metadata.json
          # Extract digests for cosign signing
          BASE_DIGEST=$(jq -r '."base"."containerimage.digest"' bake-metadata.json)
          OPENCODE_DIGEST=$(jq -r '."opencode"."containerimage.digest"' bake-metadata.json)
          PI_DIGEST=$(jq -r '."pi"."containerimage.digest"' bake-metadata.json)
          CODEX_DIGEST=$(jq -r '."codex"."containerimage.digest"' bake-metadata.json)
          GEMINI_DIGEST=$(jq -r '."gemini"."containerimage.digest"' bake-metadata.json)
          CLAUDE_DIGEST=$(jq -r '."claude"."containerimage.digest"' bake-metadata.json)
          {
            printf '%s\n' \
              "base_digest=$BASE_DIGEST" \
              "opencode_digest=$OPENCODE_DIGEST" \
              "pi_digest=$PI_DIGEST" \
              "codex_digest=$CODEX_DIGEST" \
              "gemini_digest=$GEMINI_DIGEST" \
              "claude_digest=$CLAUDE_DIGEST"
          } >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ env.VERSION }}

      - name: Cosign sign base
        run: |
          cosign sign --yes "$REGISTRY/agent-runtime-base@${{ steps.bake.outputs.base_digest }}"

      - name: Cosign sign opencode
        run: |
          cosign sign --yes "$REGISTRY/agent-runtime-opencode@${{ steps.bake.outputs.opencode_digest }}"

      - name: Cosign sign pi
        run: |
          cosign sign --yes "$REGISTRY/agent-runtime-pi@${{ steps.bake.outputs.pi_digest }}"

      - name: Cosign sign codex
        run: |
          cosign sign --yes "$REGISTRY/agent-runtime-codex@${{ steps.bake.outputs.codex_digest }}"

      - name: Cosign sign gemini
        run: |
          cosign sign --yes "$REGISTRY/agent-runtime-gemini@${{ steps.bake.outputs.gemini_digest }}"

      - name: Cosign sign claude
        run: |
          cosign sign --yes "$REGISTRY/agent-runtime-claude@${{ steps.bake.outputs.claude_digest }}"
