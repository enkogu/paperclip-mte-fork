name: MTE immutable image

on:
  pull_request:
  push:
    branches: [codex/mte-immutable-runtime]
    tags: [mte-v*]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the linux/amd64 image and sign its digest
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: mte-immutable-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.4
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: node scripts/verify-mte-fork.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:run
      - run: pnpm build

  image:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/paperclip-mte
      PUBLISH: ${{ startsWith(github.ref, 'refs/tags/mte-v') || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        if: env.PUBLISH == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build immutable linux/amd64 image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.mte
          platforms: linux/amd64
          push: ${{ env.PUBLISH == 'true' }}
          tags: ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}
            SOURCE_REPOSITORY=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true
      - name: Install cosign
        if: env.PUBLISH == 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign and verify immutable digest
        if: env.PUBLISH == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "$DIGEST"
          cosign sign --yes "$IMAGE@$DIGEST"
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/mte-immutable-image.yml@refs/(heads|tags)/.+$" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMAGE@$DIGEST"
      - name: Record immutable result
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### MTE immutable image"
            echo
            echo "- Image: \`$IMAGE:sha-$GITHUB_SHA\`"
            echo "- Digest: \`${DIGEST:-not-pushed}\`"
            echo "- Platform: \`linux/amd64\`"
            echo "- SBOM/provenance: BuildKit attestations enabled"
          } >> "$GITHUB_STEP_SUMMARY"
